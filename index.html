<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Typing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="promo-strip">JOIN THE MUSIC MAKERS — Compose with every letter</div>
    <main class="app">
        <section class="paper">
            <div id="textDisplay">
                <div id="playbackBall" class="playback-ball" aria-hidden="true"></div>
            </div>
            <textarea id="hiddenInput" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Type here to create music"></textarea>
        </section>
        <aside class="sidebar">
            <div class="brand-block">
                <span class="brand-mark" aria-hidden="true">✦</span>
                <h1 class="logo">Musical Typing</h1>
                <p class="tagline">Letters in motion.</p>
            </div>
            <div class="controls">
                <button id="clearBtn">Clear</button>
                <button id="muteBtn">Mute</button>
                <button id="playBtn">Play</button>
                <button id="downloadBtn">Download</button>
            </div>
            <div class="volume-control">
                <label for="volumeSlider">Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="70" aria-label="Volume">
            </div>
            <div class="volume-control calmer-control">
                <label for="calmerSlider">Calmer</label>
                <input type="range" id="calmerSlider" min="0" max="100" value="0" aria-label="Calmer">
            </div>
            <div class="scale-selector">
                <label for="scaleSelect">Scale</label>
                <select id="scaleSelect">
                    <option value="meditation">Meditation</option>
                    <option value="pentatonic">Pentatonic</option>
                    <option value="major">Major</option>
                    <option value="minor">Minor</option>
                    <option value="chromatic">Chromatic</option>
                    <option value="blues">Blues</option>
                </select>
            </div>
            <p class="hint">Tap the paper and type to create music.</p>
        </aside>
    </main>
    <div class="sunset-band" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
